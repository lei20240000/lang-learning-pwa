<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Membership</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/i18n.js"></script>
</head>
<body class="bg-gray-50 p-4">
  <nav class="mb-4"><a href="index.html" class="text-blue-600">← 返回首页</a></nav>
  <button onclick="getTrial()" class="w-full bg-green-600 text-white p-3 rounded mb-4" data-i18n="trial"></button>
  <div class="space-y-3">
    <div class="bg-white p-4 rounded border"><h3>季度会员 $4.99</h3><button onclick="pay(4.99)">PayPal支付</button></div>
    <div class="bg-white p-4 rounded border"><h3>年度会员 $14.99</h3><button onclick="pay(14.99)">PayPal支付</button></div>
    <div class="bg-white p-4 rounded border"><h3>永久会员 $29.99</h3><button onclick="pay(29.99)">PayPal支付</button></div>
  </div>

  <script>
    window.addEventListener("load", initI18n);
    async function getTrial() {
      await fetch("/api/trial.js", { method: "POST" });
      alert("7天免费试用已开启");
    }
    function pay(amount) {
      location.href = `https://my.lemonsqueezy.com/checkout?amount=${amount}&user_id=${localStorage.user_id}`;
    }
  </script>
</body>
</html>
