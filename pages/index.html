<!DOCTYPE html>
<html lang="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamLang</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .loading{display:none;position:fixed;inset:0;background:rgba(255,255,255,0.9);justify-content:center;align-items:center;z-index:999}
    .spin{width:40px;height:40px;border:4px solid #eee;border-top:4px solid #165DFF;border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{100%{transform:rotate(360deg)}}
    .clickable-word {cursor: pointer;color: #165DFF;font-weight: 500;}
    .clickable-word:hover {text-decoration: underline;}
  </style>
</head>
<body class="p-4 bg-gray-50 max-w-2xl mx-auto">
<div class="loading" id="load"><div class="spin"></div></div>

<!-- 顶部：品牌 + 右上角语言选择 -->
<div class="flex justify-between items-center mb-6">
  <h1 class="text-2xl font-bold text-blue-600">StreamLang</h1>
  <!-- 右上角极简语言选择（20种，2字母简写） -->
  <select id="targetLang" class="p-2 border rounded-md text-sm bg-white"></select>
</div>

<!-- 输入区域 -->
<textarea id="text" rows="5" class="w-full p-3 border rounded-lg mb-3" placeholder="输入中文..."></textarea>
<div class="flex gap-2 mb-6">
  <button onclick="startVoice()" class="flex-1 p-3 bg-gray-100 rounded-lg">🎤 语音输入</button>
  <button onclick="processText()" class="flex-1 p-3 bg-blue-600 text-white rounded-lg">🌍 翻译</button>
</div>

<!-- 翻译结果（仅展示翻译内容，无优化） -->
<div id="result" class="space-y-3"></div>

<script>
  // ======================
  // 配置：20种目标语言（ISO标准简写）
  // ======================
  const LANGUAGES = [
    { code: "en", name: "English" },
    { code: "es", name: "Spanish" },
    { code: "fr", name: "French" },
    { code: "de", name: "German" },
    { code: "ja", name: "Japanese" },
    { code: "ko", name: "Korean" },
    { code: "ru", name: "Russian" },
    { code: "pt", name: "Portuguese" },
    { code: "it", name: "Italian" },
    { code: "ar", name: "Arabic" },
    { code: "hi", name: "Hindi" },
    { code: "tr", name: "Turkish" },
    { code: "nl", name: "Dutch" },
    { code: "sv", name: "Swedish" },
    { code: "fi", name: "Finnish" },
    { code: "no", name: "Norwegian" },
    { code: "da", name: "Danish" },
    { code: "pl", name: "Polish" },
    { code: "cs", name: "Czech" },
    { code: "el", name: "Greek" }
  ];

  // ======================
  // 需求5：界面语言跟随设备系统
  // ======================
  const deviceLang = navigator.language.startsWith('zh') ? 'zh' : 'en';
  const I18N = {
    zh: { placeholder: "输入中文...", voice: "🎤 语音输入", translate: "🌍 翻译", result: "翻译结果", addWord: "✅ 已添加到单词本" },
    en: { placeholder: "Type Chinese...", voice: "🎤 Voice", translate: "🌍 Translate", result: "Translation", addWord: "✅ Added to vocab" }
  };
  const txt = I18N[deviceLang];

  // ======================
  // 初始化：加载语言选择器
  // ======================
  window.addEventListener('load', () => {
    const select = document.getElementById('targetLang');
    const savedLang = localStorage.getItem("targetLang") || "en";
    
    // 渲染20种语言
    LANGUAGES.forEach(l => {
      const opt = document.createElement('option');
      opt.value = l.code;
      opt.textContent = l.code.toUpperCase(); // 仅显示2字母大写
      select.appendChild(opt);
    });

    select.value = savedLang;
    document.getElementById('text').placeholder = txt.placeholder;
    document.querySelector('button[onclick="startVoice()"]').textContent = txt.voice;
    document.querySelector('button[onclick="processText()"]').textContent = txt.translate;

    // 保存语言选择
    select.addEventListener('change', e => localStorage.setItem("targetLang", e.target.value));
  });

  // ======================
  // 语音输入
  // ======================
  function startVoice() {
    try {
      const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
      rec.lang = "zh-CN";
      rec.start();
      rec.onresult = e => document.getElementById('text').value = e.results[0][0].transcript;
    } catch (e) { alert(deviceLang === 'zh' ? "不支持语音" : "Voice not supported"); }
  }

  // ======================
  // AI翻译（仅展示翻译结果，隐藏优化内容）
  // ======================
  async function processText() {
    const text = document.getElementById('text').value.trim();
    const lang = document.getElementById('targetLang').value;
    const load = document.getElementById('load');
    const resultBox = document.getElementById('result');

    if (!text) { alert(deviceLang === 'zh' ? "请输入内容" : "Enter text"); return; }

    load.style.display = "flex";
    try {
      const res = await fetch("/api/ai-process", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text, lang })
      });
      const data = await res.json();
      
      // 需求1：不显示优化内容 → 仅渲染翻译句子
      resultBox.innerHTML = `
        <div class="border p-4 rounded-lg bg-white">
          <h3 class="text-sm text-gray-500 mb-2">${txt.result}</h3>
          <p id="translatedSentence" class="text-lg">${data.translated}</p>
        </div>
      `;
      // 需求6：给翻译后的单词添加点击事件（手动选单词）
      makeWordsClickable();

    } catch (err) {
      alert(`Error: ${err.message}`);
    } finally {
      load.style.display = "none";
    }
  }

  // ======================
  // 需求6：手动点选单词（核心功能）
  // ======================
  function makeWordsClickable() {
    const p = document.getElementById('translatedSentence');
    const words = p.innerText.split(/\s+/);
    p.innerHTML = words.map(w => `<span class="clickable-word" onclick="addWord(this)">${w}</span>`).join(' ');
  }

  // 点击单词添加到单词本
  function addWord(element) {
    const word = element.innerText.replace(/[.,!?]/g, '');
    alert(`${txt.addWord}: ${word}`);
    // 单词本逻辑保留（接口正常后可直接对接）
  }
</script>
</body>
</html>
