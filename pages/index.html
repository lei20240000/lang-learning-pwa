<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>语言学习</title>
  <style>
    .loading{display:none;position:fixed;inset:0;background:#fff;justify-content:center;align-items:center;z-index:999}
    .spin{width:40px;height:40px;border:4px solid #eee;border-top:4px solid #3b82f6;border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{100%{transform:rotate(360deg)}}
  </style>
</head>
<body class="p-4">
  <div class="loading" id="load"><div class="spin"></div></div>

  <h1>语言学习</h1>
  <select id="targetLang" class="w-full p-3 my-2">
    <option value="es">西班牙语</option>
    <option value="en">英语</option>
  </select>

  <textarea id="text" rows="6" class="w-full p-3" placeholder="输入中文"></textarea>
  <button onclick="processText()" class="w-full p-3 bg-blue-600 text-white">AI处理</button>
  <div id="result"></div>

  <script>
    // 永久记住语言
    window.onload = () => {
      const lang = localStorage.getItem("targetLang") || "es";
      document.getElementById("targetLang").value = lang;
      document.getElementById("targetLang").onchange = (e) => {
        localStorage.setItem("targetLang", e.target.value);
      };
    };

    // AI处理
    async function processText() {
      const text = document.getElementById("text").value.trim();
      const lang = localStorage.getItem("targetLang");
      const load = document.getElementById("load");

      if(!text) { alert("请输入内容"); return; }

      load.style.display = "flex";
      try {
        const res = await fetch("/api/ai-process", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text, lang })
        });
        const data = await res.json();
        document.getElementById("result").innerHTML = `
          <div>优化：${data.optimized}</div>
          <div>翻译：${data.translated}</div>
        `;
      } catch (err) {
        alert("错误："+err.message);
      } finally {
        load.style.display = "none";
      }
    }
  </script>
</body>
</html>
