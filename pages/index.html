<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Language Learning</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/i18n.js"></script>
  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js'
    const supabase = createClient("https://otqpfonixfirwchpxtbb.supabase.co", "sb_publishable_2R814AFscx7VkSUPOrYrfw_fWoWrxz6");
    window.supabase = supabase;
  </script>
  <style>
    .loading{position:fixed;inset:0;background:rgba(255,255,255,0.8);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center}
    .spin{width:40px;height:40px;border:4px solid #eff;border-top:4px solid #2563eb;border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
  </style>
</head>
<body class="bg-gray-50 p-4">
  <div class="loading" id="load"><div class="spin"></div></div>
  <nav class="flex gap-3 mb-4 text-sm">
    <a href="/pages/index.html" class="font-bold">首页</a>
    <a href="/pages/words.html">单词本</a>
    <a href="/pages/history.html">历史</a>
    <a href="/pages/member.html">会员</a>
  </nav>
  <h1 data-i18n="title" class="text-xl font-bold mb-4"></h1>
  <textarea id="text" rows="6" class="w-full border rounded p-3 mb-2" placeholder="中文记录日常，AI转西班牙语"></textarea>
  <button onclick="startVoice()" class="w-full bg-gray-200 p-3 rounded mb-2" data-i18n="voice"></button>
  <button onclick="processText()" class="w-full bg-blue-600 text-white p-3 rounded mb-4" data-i18n="process"></button>
  <div id="result" class="space-y-3"></div>

  <script>
    window.addEventListener("load", async () => {
      initI18n();
      const { data } = await supabase.auth.getSession();
      if (!data.session) location.href = "/pages/login.html";
    });
    function startVoice() {
      const rec = new (SpeechRecognition || webkitSpeechRecognition)();
      rec.start();
      rec.onresult = (e) => document.getElementById("text").value = e.results[0][0].transcript;
    }
    async function processText() {
      const load = document.getElementById("load");
      const text = document.getElementById("text").value;
      if (!text) return alert("请输入内容");
      load.style.display = "flex";
      const res = await fetch("/api/ai-process.js", {
        method: "POST",
        body: JSON.stringify({ text, lang: "es", user_id: localStorage.user_id })
      });
      const d = await res.json();
      document.getElementById("result").innerHTML = `
        <div class="border p-3 rounded"><b>优化句式：</b>${d.optimized}</div>
        <div class="border p-3 rounded"><b>西语翻译：</b>${d.translated}</div>
        <button onclick="addWord('${d.word}','${d.trans}')" class="bg-green-600 text-white p-2 rounded">添加生词</button>
        <a href="/pages/follow.html?txt=${d.optimized}" class="block bg-purple-600 text-white p-3 rounded text-center">跟读练习</a>
      `;
      load.style.display = "none";
    }
    async function addWord(word, trans) {
      await supabase.from("user_words").insert({
        user_id: localStorage.user_id, word, translation: trans, language: "es"
      });
      alert("已添加到单词本");
    }
  </script>
</body>
</html>
