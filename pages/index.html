<!DOCTYPE html>
<html lang="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamLang</title>
  <script src="https://cdn.tailwdcss.com"></script>
  <style>
    .loading{display:none;position:fixed;inset:0;background:rgba(255,255,255,0.9);justify-content:center;align-items:center;z-index:999}
    .spin{width:40px;height:40px;border:4px solid #eee;border-top:4px solid #3b82f6;border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{100%{transform:rotate(360deg)}}
    .clickable-word {cursor: pointer;color: #3b82f6;font-weight:500}
    .clickable-word:hover{text-decoration:underline}
    .page {display:none}
    .page.active {display:block}
    .nav-btn.active {font-weight:bold;color:#3b82f6;border-bottom:2px solid #3b82f6}
    .status-box {padding:12px 16px;border-radius:10px;margin-bottom:12px;font-weight:600}
    .shadow-status {background:#eff6ff;border-left:4px solid #3b82f6;color:#1e40af}
    .challenge-status {background:#faf5ff;border-left:4px solid #8b5cf6;color:#6d28d9}
    .play-btn,.record-btn,.stop-record-btn,.play-record-btn{padding:8px 16px;border-radius:8px;margin:4px;border:none;cursor:pointer}
    .play-btn{background:#3b82f6;color:white}
    .record-btn{background:#ef4444;color:white}
    .stop-record-btn{background:#f59e0b;color:white}
    .play-record-btn{background:#10b981;color:white}
    .word-gap{color:#6b7280;font-weight:600}
    .lang-select{display:flex;gap:8px;margin-left:auto}
  </style>
</head>
<body class="p-4 bg-gray-50 max-w-2xl mx-auto">
<div class="loading" id="load"><div class="spin"></div></div>

<div class="flex justify-between items-center mb-4">
  <h1 class="text-3xl font-bold text-blue-600">StreamLang</h1>
  <div class="lang-select">
    <select id="sourceLang" class="p-2 border rounded-md text-sm bg-white"></select>
    <select id="targetLang" class="p-2 border rounded-md text-sm bg-white"></select>
  </div>
</div>

<div class="grid grid-cols-5 gap-1 text-lg mb-4 border-b pb-2">
  <button class="nav-btn active py-1" onclick="switchPage('home')">🏠 Home</button>
  <button class="nav-btn py-1" onclick="switchPage('vocab')">📖 Vocab</button>
  <button class="nav-btn py-1" onclick="switchPage('history')">📜 History</button>
  <button class="nav-btn py-1" onclick="switchPage('member')">👑 Pro</button>
  <button class="nav-btn py-1" onclick="switchPage('tiktok')">🎬 TikTok</button>
</div>

<div id="home" class="page active">
  <textarea id="text" rows="5" class="w-full p-4 border rounded-xl mb-4 text-xl" placeholder="输入文本..."></textarea>
  <div class="flex gap-3 mb-6">
    <button onclick="processText()" class="flex-1 p-4 bg-blue-600 text-white rounded-xl text-xl font-medium">🌍 Translate</button>
  </div>
  <div id="currentStatus" class="status-box hidden"></div>
  <div id="shadowPlayArea" class="hidden mb-4 flex flex-wrap gap-2"></div>
  <div id="result" class="space-y-4"></div>
</div>

<div id="vocab" class="page">
  <h3 class="text-xl font-bold mb-3">My Vocabulary</h3>
  <div class="flex gap-2 mb-3">
    <button onclick="importWords()" class="flex-1 p-2 bg-blue-100 rounded-md text-sm">📥 Import</button>
    <button onclick="reviewWords()" class="flex-1 p-2 bg-green-100 rounded-md text-sm">🔁 Review</button>
    <button onclick="dictationTest()" class="flex-1 p-2 bg-purple-100 rounded-md text-sm">🎧 Dictation</button>
  </div>
  <div id="vocabArea" class="hidden mb-3"><textarea id="importInput" rows="3" class="w-full p-2 border rounded-lg" placeholder="Paste words..."></textarea><button onclick="saveImport()" class="mt-1 w-full p-2 bg-blue-600 text-white rounded-lg">Save</button></div>
  <div id="vocabList" class="space-y-2 max-h-[400px] overflow-y-auto"></div>
</div>

<div id="history" class="page">
  <h3 class="text-xl font-bold mb-3">Study History</h3>
  <div id="historyList" class="space-y-2 max-h-[500px] overflow-y-auto"></div>
</div>

<div id="member" class="page">
  <div class="bg-gradient-to-r from-blue-500 to-purple-500 text-white p-6 rounded-lg mb-4 text-center">
    <h3 class="text-2xl font-bold">StreamLang Pro</h3>
    <p class="text-sm mt-1">7 Days Free Trial</p>
  </div>
  <div class="border p-4 rounded-lg mb-2 bg-white"><p class="font-bold text-lg">Quarterly: $4.99</p></div>
  <div class="border p-4 rounded-lg mb-2 bg-white"><p class="font-bold text-lg">Yearly: $14.99</p></div>
  <div class="border p-4 rounded-lg mb-4 bg-white"><p class="font-bold text-lg">Lifetime: $29.99</p></div>
  <a href="https://lemon-squeezy.com/" target="_blank" class="block w-full p-3 bg-blue-600 text-white rounded-lg text-center text-lg mb-6">Lemon Squeezy</a>
  
  <!-- 支持邮箱 底部独立区域 -->
  <div class="text-center text-gray-600 text-sm mt-8 pt-4 border-t">
    Support: lei20240000@gmail.com
  </div>
</div>

<div id="tiktok" class="page text-center">
  <div class="bg-gradient-to-r from-blue-500 to-purple-500 text-white p-8 rounded-lg mb-4">
    <p id="dailyQuote" class="text-2xl">Daily Sentence</p>
  </div>
  <button onclick="saveCard()" class="w-full p-3 bg-blue-600 text-white rounded-lg mb-2 text-lg">💾 Save Image</button>
  <a href="https://www.tiktok.com" target="_blank" class="block w-full p-3 bg-black rounded-lg text-lg text-white py-3">📤 Post TikTok</a>
</div>

<script>
  const sysLang = navigator.language.startsWith('zh') ? 'zh' : 'en';
  const I18N = {
    zh: {
      home:"首页",vocab:"单词本",history:"学习历史",member:"Pro",tiktok:"TikTok",
      placeholder:"输入文本...",translate:"翻译",read:"朗读",shadow:"影子跟读",challenge:"情境挑战",
      import:"导入",review:"复习",dictate:"听写",save:"保存",
      shadowStep:"跟读第{n}/10遍 · {rate}倍速",play:"播放原音",record:"录音",stopRecord:"停止录音",playRecord:"播放录音",
      challenge1:"0.8倍速 × 2遍",challenge2:"1.0倍速 × 2遍",challenge3:"1.0倍速 · 单词空缺",
      done:"完成！",wordAdded:"单词已添加",recording:"🎤 录音中...",recordStop:"录音已停止",noRecord:"无录音可播放"
    },
    en: {
      home:"Home",vocab:"Vocab",history:"History",member:"Pro",tiktok:"TikTok",
      placeholder:"Type text...",translate:"Translate",read:"Read",shadow:"Shadow",challenge:"Scene Challenge",
      import:"Import",review:"Review",dictate:"Dictation",save:"Save",
      shadowStep:"Shadow {n}/10 · {rate}x",play:"Play",record:"Record",stopRecord:"Stop Record",playRecord:"Play Record",
      challenge1:"0.8x × 2 times",challenge2:"1.0x × 2 times",challenge3:"1.0x · Word Gap",
      done:"Done!",wordAdded:"Word added",recording:"🎤 Recording...",recordStop:"Recording stopped",noRecord:"No recording"
    }
  };
  const txt = I18N[sysLang];

  // 源语言 40 种（按使用人口排序）
  const SOURCE_LANGS = [
    {code:"zh",name:"中文"},{code:"en",name:"English"},{code:"hi",name:"Hindi"},
    {code:"es",name:"Spanish"},{code:"fr",name:"French"},{code:"ar",name:"Arabic"},
    {code:"bn",name:"Bengali"},{code:"pt",name:"Portuguese"},{code:"ru",name:"Russian"},
    {code:"ur",name:"Urdu"},{code:"id",name:"Indonesian"},{code:"de",name:"German"},
    {code:"ja",name:"Japanese"},{code:"sw",name:"Swahili"},{code:"vi",name:"Vietnamese"},
    {code:"jv",name:"Javanese"},{code:"ha",name:"Hausa"},{code:"pa",name:"Punjabi"},
    {code:"mr",name:"Marathi"},{code:"te",name:"Telugu"},{code:"tr",name:"Turkish"},
    {code:"ko",name:"Korean"},{code:"ta",name:"Tamil"},{code:"fa",name:"Persian"},
    {code:"gu",name:"Gujarati"},{code:"pl",name:"Polish"},{code:"uk",name:"Ukrainian"},
    {code:"it",name:"Italian"},{code:"ca",name:"Catalan"},{code:"ro",name:"Romanian"},
    {code:"nl",name:"Dutch"},{code:"el",name:"Greek"},{code:"hu",name:"Hungarian"},
    {code:"sv",name:"Swedish"},{code:"cs",name:"Czech"},{code:"fi",name:"Finnish"},
    {code:"no",name:"Norwegian"},{code:"da",name:"Danish"},{code:"sk",name:"Slovak"},
    {code:"bg",name:"Bulgarian"}
  ];

  // 目标语言 20 种（含全部指定语言）
  const TARGET_LANGS = [
    {code:"en",name:"English"},{code:"zh",name:"中文"},{code:"hi",name:"Hindi"},
    {code:"es",name:"Spanish"},{code:"fr",name:"French"},{code:"ar",name:"Arabic"},
    {code:"pt",name:"Portuguese"},{code:"ru",name:"Russian"},{code:"ur",name:"Urdu"},
    {code:"id",name:"Indonesian"},{code:"sw",name:"Swahili"},{code:"vi",name:"Vietnamese"},
    {code:"jv",name:"Javanese"},{code:"ha",name:"Hausa"},{code:"de",name:"German"},
    {code:"ja",name:"Japanese"},{code:"ko",name:"Korean"},{code:"tr",name:"Turkish"},
    {code:"it",name:"Italian"},{code:"nl",name:"Dutch"}
  ];

  let sourceLang = "en", targetLang = "zh";
  let currentTrans = "", currentText = "";
  let vocab = JSON.parse(localStorage.getItem("slVocab")) || [];
  let history = JSON.parse(localStorage.getItem("slHistory")) || [];
  let shadowStepIndex = 0;
  let mediaRecorder = null, audioChunks = [], audioStream = null;

  const shadowPlan = [
    {rate:0.6},{rate:0.6},{rate:0.8},{rate:0.8},{rate:1.0},
    {rate:0.6},{rate:0.8},{rate:0.8},{rate:1.0},{rate:1.0}
  ];

  window.onload = () => {
    document.getElementById('text').placeholder = txt.placeholder;
    document.querySelector('button[onclick="processText()"]').textContent = `🌍 ${txt.translate}`;

    const sourceSel = document.getElementById("sourceLang");
    const targetSel = document.getElementById("targetLang");
    SOURCE_LANGS.forEach(l => {
      let o = document.createElement("option");
      o.value = l.code; o.textContent = l.name;
      sourceSel.appendChild(o);
    });
    TARGET_LANGS.forEach(l => {
      let o = document.createElement("option");
      o.value = l.code; o.textContent = l.name;
      targetSel.appendChild(o);
    });

    sourceSel.value = localStorage.getItem("slSource") || "en";
    targetSel.value = localStorage.getItem("slTarget") || "zh";
    sourceSel.onchange = e => { localStorage.setItem("slSource", e.target.value); sourceLang = e.target.value; };
    targetSel.onchange = e => { localStorage.setItem("slTarget", e.target.value); targetLang = e.target.value; };
    sourceLang = sourceSel.value; targetLang = targetSel.value;

    renderVocab(); renderHistory(); loadDailyQuote();
  };

  function switchPage(id) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    event.target.classList.add("active");
  }

  // 安全调用：走 Vercel 后端 /api/ai-process，不暴露密钥
  async function processText() {
    const t = document.getElementById("text").value.trim();
    if (!t) return;
    currentText = t;
    document.getElementById("load").style.display = "flex";
    try {
      const res = await fetch("/api/ai-process", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          text: t,
          from: sourceLang,
          to: targetLang
        })
      });
      const d = await res.json();
      currentTrans = d.translated;

      document.getElementById("result").innerHTML = `
        <div class="border p-6 rounded-xl bg-white">
          <p id="transSentence" class="text-xl text-blue-600 mb-4">${d.translated}</p>
          <div class="flex gap-3 flex-wrap">
            <button onclick="speakText('${d.translated}')" class="p-3 bg-gray-100 rounded-lg">${txt.read}</button>
            <button onclick="initShadow()" class="p-3 bg-blue-100 rounded-lg">${txt.shadow}</button>
            <button onclick="startChallenge()" class="p-3 bg-purple-100 rounded-lg">${txt.challenge}</button>
          </div>
        </div>`;
      makeWordsClickable();
      saveHistory(t, d.translated);
    } catch (e) {
      alert("Translation error");
    }
    document.getElementById("load").style.display = "none";
  }

  function speakText(text) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = targetLang;
    window.speechSynthesis.speak(u);
  }
  async function speakAndGetDur(text, rate=1) {
    return new Promise(resolve => {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = targetLang; u.rate = rate;
      const start = Date.now();
      u.onend = () => resolve(Date.now() - start);
      window.speechSynthesis.speak(u);
    });
  }

  // 影子跟读：仅最后一遍显示录音
  function initShadow() {
    if (!currentTrans) return;
    shadowStepIndex = 0;
    const st = document.getElementById("currentStatus");
    const playArea = document.getElementById("shadowPlayArea");
    st.className = "status-box shadow-status";
    st.classList.remove("hidden");
    playArea.classList.remove("hidden");
    showShadowStep();
  }
  function showShadowStep() {
    const isLastStep = shadowStepIndex === shadowPlan.length - 1;
    if (shadowStepIndex >= shadowPlan.length) {
      document.getElementById("currentStatus").textContent = txt.done;
      document.getElementById("shadowPlayArea").innerHTML = "";
      return;
    }
    const step = shadowPlan[shadowStepIndex];
    document.getElementById("currentStatus").textContent = txt.shadowStep.replace("{n}", shadowStepIndex+1).replace("{rate}", step.rate);
    document.getElementById("shadowPlayArea").innerHTML = isLastStep ? `
      <button class="play-btn" onclick="playShadowStep()">${txt.play}</button>
      <button class="record-btn" onclick="startRecord()">${txt.record}</button>
      <button class="stop-record-btn" onclick="stopRecord()">${txt.stopRecord}</button>
      <button class="play-record-btn" onclick="playRecord()">${txt.playRecord}</button>
    ` : `<button class="play-btn" onclick="playShadowStep()">${txt.play}</button>`;
  }
  async function playShadowStep() {
    const step = shadowPlan[shadowStepIndex];
    const dur = await speakAndGetDur(currentTrans, step.rate);
    await new Promise(r => setTimeout(r, dur + 3000));
    shadowStepIndex++;
    showShadowStep();
  }

  // 情景挑战：仅最后一轮录音
  async function startChallenge() {
    if (!currentTrans) return;
    const st = document.getElementById("currentStatus");
    st.className = "status-box challenge-status";
    st.classList.remove("hidden");
    const words = currentTrans.split(/\s+/);
    let challengeStep = 0;

    const steps = [
      {rate:0.8, text:currentTrans, label:txt.challenge1, times:2},
      {rate:1.0, text:currentTrans, label:txt.challenge2, times:2},
      {rate:1.0, text:maskFullWords(words), label:txt.challenge3, times:1}
    ];

    for (let s of steps) {
      for (let i=0;i<s.times;i++) {
        const isLastRound = challengeStep === steps.length-1 && i === s.times-1;
        st.textContent = s.label;
        document.getElementById("result").innerHTML = isLastRound ? `
          <div class="border p-6 rounded-xl bg-white">
            <p class="text-xl">${s.text}</p>
            <div class="flex gap-2 mt-3">
              <button class="record-btn" onclick="startRecord()">${txt.record}</button>
              <button class="stop-record-btn" onclick="stopRecord()">${txt.stopRecord}</button>
              <button class="play-record-btn" onclick="playRecord()">${txt.playRecord}</button>
            </div>
          </div>` : `<div class="border p-6 rounded-xl bg-white"><p class="text-xl">${s.text}</p></div>`;
        const dur = await speakAndGetDur(s.text, s.rate);
        await new Promise(r => setTimeout(r, dur + 3000));
      }
      challengeStep++;
    }
    st.textContent = txt.done;
    document.getElementById("result").innerHTML = "";
  }
  function maskFullWords(words) {
    return words.map((word, idx) => idx%2!==0 ? `<span class="word-gap">____</span>` : word).join(" ");
  }

  // 录音功能
  async function startRecord() {
    try {
      audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunks = [];
      mediaRecorder = new MediaRecorder(audioStream);
      mediaRecorder.ondataavailable = e=>audioChunks.push(e.data);
      mediaRecorder.start();
      document.getElementById("currentStatus").textContent = txt.recording;
    } catch (err) { alert("请允许麦克风权限"); }
  }
  function stopRecord() {
    if(!mediaRecorder||mediaRecorder.state==="inactive")return;
    mediaRecorder.stop(); audioStream.getTracks().forEach(t=>t.stop());
    document.getElementById("currentStatus").textContent = txt.recordStop;
  }
  function playRecord() {
    if(audioChunks.length===0){alert(txt.noRecord);return;}
    new Audio(URL.createObjectURL(new Blob(audioChunks,{type:'audio/wav'}))).play();
  }

  // 单词本
  function makeWordsClickable(){
    const p=document.getElementById("transSentence");
    p.innerHTML=p.innerText.split(/\s+/).map(w=>`<span class="clickable-word" onclick="addWord(this)">${w}</span>`).join(" ");
  }
  function addWord(el){
    const w=el.innerText.replace(/[.,!?;:]/g,"").trim();
    if(w&&!vocab.includes(w)){vocab.push(w);localStorage.setItem("slVocab",JSON.stringify(vocab));renderVocab();alert(txt.wordAdded);}
  }
  function importWords(){document.getElementById("vocabArea").classList.toggle("hidden")}
  function saveImport(){
    const ws=document.getElementById("importInput").value.split("\n").filter(x=>x.trim());
    vocab=[...new Set([...vocab,...ws])];localStorage.setItem("slVocab",JSON.stringify(vocab));renderVocab();
    document.getElementById("vocabArea").classList.add("hidden");
  }
  function reviewWords(){const w=vocab[Math.floor(Math.random()*vocab.length)];w&&alert(w);}
  function dictationTest(){const w=vocab[Math.floor(Math.random()*vocab.length)];if(w){speakText(w);prompt("Type:")}}
  function renderVocab(){
    document.getElementById("vocabList").innerHTML=vocab.length?vocab.map((w,i)=>`
      <div class="flex justify-between border p-3 rounded-lg">
        <span class="text-lg">${w}</span>
        <div class="flex gap-2">
          <button onclick="speakText('${w}')" class="p-1 bg-gray-100 rounded-xs text-xs">🔊</button>
          <button onclick="delWord(${i})" class="p-1 bg-red-100 rounded-xs text-xs">🗑️</button>
        </div>
      </div>
    `).join(""):"<p class='text-gray-500'>No words</p>";
  }
  function delWord(i){vocab.splice(i,1);localStorage.setItem("slVocab",JSON.stringify(vocab));renderVocab()}

  // 历史
  function saveHistory(text,trans){
    history.unshift({text,trans,from:sourceLang,to:targetLang,time:new Date().toLocaleString()});
    localStorage.setItem("slHistory",JSON.stringify(history));renderHistory();
  }
  function renderHistory(){
    document.getElementById("historyList").innerHTML=history.map(h=>`
      <div class="border p-3 rounded-lg">
        <p class="text-sm text-gray-500">${h.time}</p>
        <p class="text-sm">${h.text}</p>
        <p class="text-blue-600 text-lg mt-1">${h.trans}</p>
        <button onclick="speakText('${h.trans}')" class="text-xs p-1 bg-gray-100 rounded-md mt-1">${txt.read}</button>
      </div>
    `).join("");
  }

  function loadDailyQuote(){
    const quotes=["Practice makes perfect.","Never too old to learn.","Keep going, you're doing great!","Every day is a new chance to learn."];
    document.getElementById("dailyQuote").innerText=quotes[Math.floor(Math.random()*quotes.length)];
  }
  function saveCard(){alert("Saved!")}
</script>
</body>
</html>
