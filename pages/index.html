<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamLang</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .loading{display:none;position:fixed;inset:0;background:rgba(255,255,255,0.9);display:flex;align-items:center;justify-content:center;z-index:999}
    .spin{width:40px;height:40px;border:4px solid #eee;border-top:4px solid #3b82f6;border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{100%{transform:rotate(360deg)}}
    .clickable-word{cursor:pointer;color:#3b82f6;font-weight:500}
    .clickable-word:hover{text-decoration:underline}
    .page{display:none}
    .page.active{display:block}
    .nav-btn.active{font-weight:bold;color:#3b82f6;border-bottom:2px solid #3b82f6}
    .status-box{padding:12px 16px;border-radius:10px;margin-bottom:12px;font-weight:600}
    .shadow-status{background:#eff6ff;border-left:4px solid #3b82f6;color:#1e40af}
    .challenge-status{background:#faf5ff;border-left:4px solid #8b5cf6;color:#6d28d9}
  </style>
</head>

<body class="p-4 bg-gray-50 max-w-2xl mx-auto">
<div class="loading" id="load"><div class="spin"></div></div>

<div class="flex justify-between items-center mb-4">
  <h1 class="text-3xl font-bold text-blue-600">StreamLang</h1>
  <div class="flex gap-2">
    <select id="sourceLang" class="p-2 border rounded-md text-sm bg-white"></select>
    <select id="targetLang" class="p-2 border rounded-md text-sm bg-white"></select>
  </div>
</div>

<div class="grid grid-cols-5 gap-1 text-lg mb-4 border-b pb-2">
  <button class="nav-btn active py-1" onclick="switchPage('home')">Home</button>
  <button class="nav-btn py-1" onclick="switchPage('vocab')">Vocab</button>
  <button class="nav-btn py-1" onclick="switchPage('history')">History</button>
  <button class="nav-btn py-1" onclick="switchPage('member')">Pro</button>
  <button class="nav-btn py-1" onclick="switchPage('tiktok')">TikTok</button>
</div>

<div id="home" class="page active">
  <textarea id="text" rows="5" class="w-full p-4 border rounded-xl mb-4 text-xl" placeholder="Enter text..."></textarea>
  <button onclick="processText()" class="w-full p-4 bg-blue-600 text-white rounded-xl text-xl font-medium mb-6">Translate</button>
  <div id="currentStatus" class="status-box hidden"></div>
  <div id="result" class="space-y-4"></div>
</div>

<div id="vocab" class="page">
  <h3 class="text-xl font-bold mb-3">My Vocabulary</h3>
  <div class="flex gap-2 mb-3">
    <button onclick="importWords()" class="flex-1 p-2 bg-blue-100 rounded-md">Import</button>
    <button onclick="reviewWords()" class="flex-1 p-2 bg-green-100 rounded-md">Review</button>
    <button onclick="dictationTest()" class="flex-1 p-2 bg-purple-100 rounded-md">Dictation</button>
  </div>
  <div id="vocabArea" class="hidden mb-3">
    <textarea id="importInput" rows="3" class="w-full p-2 border rounded-lg" placeholder="Paste words..."></textarea>
    <button onclick="saveImport()" class="mt-1 w-full p-2 bg-blue-600 text-white rounded-lg">Save</button>
  </div>
  <div id="vocabList" class="space-y-2 max-h-[400px] overflow-y-auto"></div>
</div>

<div id="history" class="page">
  <h3 class="text-xl font-bold mb-3">Study History</h3>
  <div id="historyList" class="space-y-2 max-h-[500px] overflow-y-auto"></div>
</div>

<div id="member" class="page">
  <div class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white p-6 rounded-2xl mb-6 text-center shadow-lg">
    <h2 class="text-3xl font-bold">StreamLang Pro</h2>
    <p class="opacity-90">Unlock all features</p>
  </div>
  <div class="grid gap-4 mb-6">
    <div class="bg-white border rounded-2xl p-5 shadow-sm">
      <div class="font-bold text-lg">Quarterly</div>
      <div class="text-blue-700 text-xl font-bold my-2">$4.99</div>
      <a href="https://lemon-squeezy.com/" target="_blank" class="block w-full py-2 bg-blue-600 text-white rounded-xl text-center">Subscribe</a>
    </div>
    <div class="bg-white border rounded-2xl p-5 shadow-sm">
      <div class="font-bold text-lg">Yearly</div>
      <div class="text-blue-700 text-xl font-bold my-2">$14.99</div>
      <a href="https://lemon-squeezy.com/" target="_blank" class="block w-full py-2 bg-blue-600 text-white rounded-xl text-center">Subscribe</a>
    </div>
    <div class="bg-white border border-purple-400 rounded-2xl p-5 shadow-sm">
      <div class="font-bold text-lg">Lifetime</div>
      <div class="text-purple-700 text-xl font-bold my-2">$29.99</div>
      <a href="https://lemon-squeezy.com/" target="_blank" class="block w-full py-2 bg-purple-600 text-white rounded-xl text-center">Get Lifetime</a>
    </div>
  </div>
  <div class="text-center text-gray-500 text-sm pt-4 border-t">Support: lei20240000@gmail.com</div>
</div>

<div id="tiktok" class="page text-center">
  <div class="bg-gradient-to-r from-blue-500 to-purple-500 text-white p-8 rounded-2xl mb-4">
    <p id="dailyQuote" class="text-2xl">Daily Sentence</p>
  </div>
  <button onclick="alert('Saved')" class="w-full p-3 bg-blue-600 text-white rounded-xl mb-2">Save Image</button>
  <a href="https://tiktok.com" target="_blank" class="block w-full p-3 bg-black text-white rounded-xl">Post to TikTok</a>
</div>

<script>
  const READ_INTERVAL = 2000;
  const SHADOW_RATE = 0.8;
  const CHALLENGE_RATE = 1.0;

  const SOURCE_LANGS = [
    {code:"en",name:"English"},{code:"zh",name:"中文"},{code:"hi",name:"Hindi"},
    {code:"es",name:"Spanish"},{code:"fr",name:"French"},{code:"ar",name:"Arabic"},
    {code:"bn",name:"Bengali"},{code:"pt",name:"Portuguese"},{code:"ru",name:"Russian"},
    {code:"ur",name:"Urdu"},{code:"id",name:"Indonesian"},{code:"de",name:"German"},
    {code:"ja",name:"Japanese"},{code:"sw",name:"Swahili"},{code:"vi",name:"Vietnamese"},
    {code:"jv",name:"Javanese"},{code:"ha",name:"Hausa"},{code:"pa",name:"Punjabi"},
    {code:"mr",name:"Marathi"},{code:"te",name:"Telugu"},{code:"tr",name:"Turkish"},
    {code:"ko",name:"Korean"},{code:"ta",name:"Tamil"},{code:"fa",name:"Persian"},
    {code:"gu",name:"Gujarati"},{code:"pl",name:"Polish"},{code:"uk",name:"Ukrainian"},
    {code:"it",name:"Italian"},{code:"nl",name:"Dutch"}
  ];

  const TARGET_LANGS = [
    {code:"en",name:"English"},{code:"zh",name:"中文"},{code:"hi",name:"Hindi"},
    {code:"es",name:"Spanish"},{code:"fr",name:"French"},{code:"ar",name:"Arabic"},
    {code:"pt",name:"Portuguese"},{code:"ru",name:"Russian"},{code:"ur",name:"Urdu"},
    {code:"id",name:"Indonesian"},{code:"sw",name:"Swahili"},{code:"vi",name:"Vietnamese"},
    {code:"de",name:"German"},{code:"ja",name:"Japanese"},{code:"ko",name:"Korean"},
    {code:"tr",name:"Turkish"},{code:"it",name:"Italian"},{code:"nl",name:"Dutch"}
  ];

  let sourceLang = "en", targetLang = "zh";
  let currentTrans = "";
  let vocab = JSON.parse(localStorage.getItem("slVocab")) || [];
  let history = JSON.parse(localStorage.getItem("slHistory")) || [];

  window.onload = () => {
    const s = document.getElementById("sourceLang");
    const t = document.getElementById("targetLang");
    SOURCE_LANGS.forEach(l => { let o = document.createElement("option"); o.value = l.code; o.textContent = l.name; s.appendChild(o); });
    TARGET_LANGS.forEach(l => { let o = document.createElement("option"); o.value = l.code; o.textContent = l.name; t.appendChild(o); });
    s.value = localStorage.getItem("slSource") || "en";
    t.value = localStorage.getItem("slTarget") || "zh";
    s.onchange = e => { localStorage.setItem("slSource", e.target.value); sourceLang = e.target.value; };
    t.onchange = e => { localStorage.setItem("slTarget", e.target.value); targetLang = e.target.value; };
    sourceLang = s.value; targetLang = t.value;
    renderVocab(); renderHistory(); loadQuote();
  };

  function switchPage(id) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    event.target.classList.add("active");
  }

  async function processText() {
    const text = document.getElementById("text").value.trim();
    if (!text) return;
    document.getElementById("load").style.display = "flex";
    try {
      const res = await fetch("/api/ai-process", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text, from: sourceLang, to: targetLang })
      });
      const data = await res.json();
      currentTrans = data.translated;
      document.getElementById("result").innerHTML = `
        <div class="border p-6 rounded-xl bg-white">
          <p id="sentence" class="text-xl text-blue-600 mb-4">${currentTrans}</p>
          <div class="flex gap-3 flex-wrap">
            <button onclick="speak(currentTrans)" class="p-3 bg-gray-100 rounded-lg">Read</button>
            <button onclick="autoShadow()" class="p-3 bg-blue-100 rounded-lg">Shadow</button>
            <button onclick="autoChallenge()" class="p-3 bg-purple-100 rounded-lg">Challenge</button>
          </div>
        </div>`;
      makeClickable();
      addHistory(text, currentTrans);
    } catch (e) {
      alert("Translation error");
    }
    document.getElementById("load").style.display = "none";
  }

  function speak(text, rate = 1) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = targetLang; u.rate = rate;
    window.speechSynthesis.speak(u);
  }

  function speakWait(text, rate = 1) {
    return new Promise(resolve => {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = targetLang; u.rate = rate;
      u.onend = resolve;
      window.speechSynthesis.speak(u);
    });
  }

  async function autoRead(text, times, rate) {
    for (let i = 0; i < times; i++) {
      await speakWait(text, rate);
      if (i !== times - 1) await new Promise(r => setTimeout(r, READ_INTERVAL));
    }
  }

  async function autoShadow() {
    if (!currentTrans) return;
    const st = document.getElementById("currentStatus");
    st.className = "status-box shadow-status";
    st.classList.remove("hidden");
    st.textContent = "Shadow following · 5 times";
    await autoRead(currentTrans, 5, SHADOW_RATE);
    st.textContent = "Done!";
  }

  async function autoChallenge() {
    if (!currentTrans) return;
    const st = document.getElementById("currentStatus");
    st.className = "status-box challenge-status";
    st.classList.remove("hidden");
    st.textContent = "Scene Challenge · 3 times";
    await autoRead(currentTrans, 3, CHALLENGE_RATE);
    st.textContent = "Done!";
  }

  function makeClickable() {
    const p = document.getElementById("sentence");
    p.innerHTML = p.innerText.split(/\s+/).map(w => `<span class="clickable-word" onclick="addWord(this)">${w}</span>`).join(" ");
  }

  function addWord(el) {
    const w = el.innerText.replace(/[.,!?;:]/g, "").trim();
    if (w && !vocab.includes(w)) {
      vocab.push(w);
      localStorage.setItem("slVocab", JSON.stringify(vocab));
      renderVocab();
    }
  }

  function importWords() { document.getElementById("vocabArea").classList.toggle("hidden"); }
  function saveImport() {
    const words = document.getElementById("importInput").value.split("\n").filter(x => x.trim());
    vocab = [...new Set([...vocab, ...words])];
    localStorage.setItem("slVocab", JSON.stringify(vocab));
    renderVocab();
    document.getElementById("vocabArea").classList.add("hidden");
  }

  function reviewWords() { const w = vocab[Math.floor(Math.random() * vocab.length)]; if (w) alert(w); }
  function dictationTest() { const w = vocab[Math.floor(Math.random() * vocab.length)]; if (w) { speak(w); prompt("Type:"); } }
  function renderVocab() {
    const list = document.getElementById("vocabList");
    list.innerHTML = vocab.length ? vocab.map((w, i) => `
      <div class="flex justify-between border p-3 rounded-lg">
        <span class="text-lg">${w}</span>
        <div class="flex gap-2">
          <button onclick="speak('${w}')" class="p-1 bg-gray-100 text-xs rounded">🔊</button>
          <button onclick="delWord(${i})" class="p-1 bg-red-100 text-xs rounded">🗑️</button>
        </div>
      </div>
    `).join("") : "<p class='text-gray-500'>No words yet</p>";
  }

  function delWord(i) { vocab.splice(i, 1); localStorage.setItem("slVocab", JSON.stringify(vocab)); renderVocab(); }

  function addHistory(text, trans) {
    history.unshift({ text, trans, time: new Date().toLocaleString() });
    localStorage.setItem("slHistory", JSON.stringify(history));
    renderHistory();
  }

  function renderHistory() {
    const list = document.getElementById("historyList");
    list.innerHTML = history.map(h => `
      <div class="border p-3 rounded-lg">
        <p class="text-xs text-gray-500">${h.time}</p>
        <p class="text-sm">${h.text}</p>
        <p class="text-blue-600 text-lg mt-1">${h.trans}</p>
        <button onclick="speak('${h.trans}')" class="text-xs p-1 bg-gray-100 rounded mt-1">Listen</button>
      </div>
    `).join("");
  }

  function loadQuote() {
    const q = ["Practice makes perfect", "Never too old to learn", "Keep going", "Learn a little every day"];
    document.getElementById("dailyQuote").innerText = q[Math.floor(Math.random() * q.length)];
  }
</script>
</body>
</html>
