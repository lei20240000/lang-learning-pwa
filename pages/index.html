<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>语言学习</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/i18n.js"></script>
  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js'
    const supabase = createClient("https://otqpfonixfirwchpxtbb.supabase.co", "sb_publishable_2R814AFscx7VkSUPOrYrfw_fWoWrxz6");
    window.supabase = supabase;
  </script>
  <style>
    .loading{position:fixed;inset:0;background:rgba(255,255,255,0.8);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:999}
    .spin{width:40px;height:40px;border:4px solid #eff;border-top:4px solid #2563eb;border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
  </style>
</head>
<body class="bg-gray-50 p-4">
  <div class="loading" id="load"><div class="spin"></div></div>
  <nav class="flex gap-3 mb-4 text-sm">
    <a href="/pages/index.html" class="font-bold">首页</a>
    <a href="/pages/words.html">单词本</a>
    <a href="/pages/history.html">学习历史</a>
    <a href="/pages/member.html" class="font-bold">会员中心</a>
  </nav>

  <h1 data-i18n="title" class="text-xl font-bold mb-4"></h1>

  <!-- 语言选择器 -->
  <div class="mb-3">
    <label class="text-sm text-gray-600 block mb-1">选择目标语言</label>
    <select id="targetLang" class="w-full border rounded p-3">
      <option value="es" selected>🇪🇸 西班牙语（默认）</option>
      <option value="en">🇺🇸 英语</option>
      <option value="fr">🇫🇷 法语</option>
      <option value="de">🇩🇪 德语</option>
    </select>
  </div>

  <textarea id="text" rows="6" class="w-full border rounded p-3 mb-2" placeholder="中文记录日常，AI自动翻译优化"></textarea>
  <button onclick="startVoice()" class="w-full bg-gray-200 p-3 rounded mb-2">语音输入</button>
  <button onclick="processText()" class="w-full bg-blue-600 text-white p-3 rounded mb-4">AI处理</button>
  <div id="result" class="space-y-3"></div>

  <script>
    window.addEventListener("load", async () => {
      initI18n();
      const { data } = await supabase.auth.getSession();
      if (!data.session) location.href = "/pages/login.html";
    });

    // 修复：语音识别兼容性（彻底解决格式匹配错误）
    function startVoice() {
      if (!window.SpeechRecognition && !window.webkitSpeechRecognition) {
        alert("您的浏览器不支持语音输入");
        return;
      }
      const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
      rec.lang = "zh-CN";
      rec.interimResults = false;
      rec.maxAlternatives = 1;
      
      rec.onresult = (e) => {
        document.getElementById("text").value = e.results[0][0].transcript;
      };
      rec.onerror = () => {};
      rec.start();
    }

    // 修复：AI处理
    async function processText() {
      const load = document.getElementById("load");
      const text = document.getElementById("text").value.trim();
      const lang = document.getElementById("targetLang").value;

      if (!text) { alert("请输入内容"); return; }

      try {
        load.style.display = "flex";
        const res = await fetch("/api/ai-process.js", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text, lang })
        });

        const data = await res.json();
        if (data.error) throw new Error(data.error);

        document.getElementById("result").innerHTML = `
          <div class="border p-3 rounded"><b>优化中文：</b>${data.optimized}</div>
          <div class="border p-3 rounded"><b>翻译结果：</b>${data.translated}</div>
          <button onclick="addWord('${data.word}','${data.trans}')" class="bg-green-600 text-white p-2 rounded">添加生词</button>
          <a href="/pages/follow.html?txt=${data.translated}" class="block bg-purple-600 text-white p-3 rounded text-center">跟读练习</a>
        `;
      } catch (err) {
        alert("AI处理失败：" + err.message);
      } finally {
        load.style.display = "none";
      }
    }

    // 添加生词
    async function addWord(word, trans) {
      try {
        const { data } = await supabase.auth.getUser();
        await supabase.from("user_words").insert({
          user_id: data.user.id,
          word, translation: trans, language: document.getElementById("targetLang").value
        });
        alert("已添加到单词本");
      } catch (e) {
        alert("添加失败");
      }
    }
  </script>
</body>
</html>
