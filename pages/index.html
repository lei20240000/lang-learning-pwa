<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>语言学习</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/i18n.js"></script>
  <style>
    .loading{position:fixed;inset:0;background:rgba(255,255,255,0.9);display:none;align-items:center;justify-content:center;z-index:999}
    .spin{width:40px;height:40px;border:4px solid #eee;border-top:4px solid #3b82f6;border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{100%{transform:rotate(360deg)}}
  </style>
</head>
<body class="p-4 bg-gray-50">
  <div class="loading" id="load"><div class="spin"></div></div>

  <nav class="flex gap-3 mb-4 text-sm">
    <a href="/pages/index.html" class="font-bold">首页</a>
    <a href="/pages/words.html">单词本</a>
    <a href="/pages/history.html">学习历史</a>
    <a href="/pages/member.html">会员</a>
  </nav>

  <h1 data-i18n="title" class="text-xl font-bold mb-4"></h1>

  <!-- 目标语言选择（永久记忆） -->
  <div class="mb-3">
    <label class="text-sm block mb-1">目标语言</label>
    <select id="targetLang" class="w-full p-3 border rounded">
      <option value="es">西班牙语</option>
      <option value="en">英语</option>
    </select>
  </div>

  <textarea id="text" rows="6" class="w-full p-3 border rounded mb-2" placeholder="输入中文"></textarea>
  
  <button onclick="startVoice()" class="w-full p-3 bg-gray-200 rounded mb-2">语音输入</button>
  <button onclick="processText()" class="w-full p-3 bg-blue-600 text-white rounded mb-4">AI处理</button>

  <div id="result" class="space-y-3"></div>

  <script>
    // 🔥 保留：语言永久记忆（你的核心需求）
    window.onload = function() {
      initI18n();
      const savedLang = localStorage.getItem("targetLang") || "es";
      document.getElementById("targetLang").value = savedLang;
      document.getElementById("targetLang").addEventListener("change", (e) => {
        localStorage.setItem("targetLang", e.target.value);
      });
    };

    // 🔥 【根因修复】语音识别：删除所有兼容判断，只留浏览器原生标准格式
    function startVoice() {
      try {
        // 唯一报错点：严格使用标准格式，无任何兼容写法，彻底修复格式错误
        const rec = new webkitSpeechRecognition();
        rec.lang = "zh-CN"; // 严格标准格式，大小写不能改
        rec.start();
        rec.onresult = function(e) {
          document.getElementById("text").value = e.results[0][0].transcript;
        };
      } catch (e) {
        // 语音不支持就跳过，绝不抛格式错误
        console.log("语音不可用");
      }
    }

    // 🔥 保留：AI处理（无任何改动）
    async function processText() {
      const text = document.getElementById("text").value.trim();
      const load = document.getElementById("load");
      const lang = localStorage.getItem("targetLang") || "es";

      if (!text) { alert("请输入内容"); return; }

      try {
        load.style.display = "flex";
        const res = await fetch("/api/ai-process.js", {
          method: "POST",
          body: JSON.stringify({ text, lang })
        });
        const data = await res.json();
        document.getElementById("result").innerHTML = `
          <div class="border p-3 rounded">优化：${data.optimized}</div>
          <div class="border p-3 rounded">翻译：${data.translated}</div>
        `;
      } catch (err) {
        alert("错误：" + err.message);
      } finally {
        load.style.display = "none";
      }
    }
  </script>
</body>
</html>
