<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>语言学习</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/i18n.js"></script>
  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js'
    const supabase = createClient("https://otqpfonixfirwchpxtbb.supabase.co", "sb_publishable_2R814AFscx7VkSUPOrYrfw_fWoWrxz6");
    window.supabase = supabase;
  </script>
  <style>
    .loading{position:fixed;inset:0;background:rgba(255,255,255,0.8);display:none;align-items:center;justify-content:center;z-index:999}
    .spin{width:40px;height:40px;border:4px solid #eee;border-top:4px solid #2563eb;border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
  </style>
</head>
<body class="bg-gray-50 p-4">
  <div class="loading" id="load"><div class="spin"></div></div>
  <nav class="flex gap-3 mb-4 text-sm">
    <a href="/pages/index.html" class="font-bold">首页</a>
    <a href="/pages/words.html">单词本</a>
    <a href="/pages/history.html">学习历史</a>
    <a href="/pages/member.html">会员中心</a>
  </nav>

  <h1 data-i18n="title" class="text-xl font-bold mb-4"></h1>

  <div class="mb-3">
    <label class="text-sm block mb-1">目标语言</label>
    <select id="targetLang" class="w-full border rounded p-3">
      <option value="es" selected>西班牙语（默认）</option>
      <option value="en">英语</option>
    </select>
  </div>

  <textarea id="text" rows="6" class="w-full border rounded p-3 mb-2" placeholder="输入中文"></textarea>
  <button onclick="processText()" class="w-full bg-blue-600 text-white p-3 rounded mb-4">AI处理</button>
  <div id="result"></div>

  <script>
    window.addEventListener("load", async () => {
      initI18n();
      const { data } = await supabase.auth.getSession();
      if (!data.session) location.href = "/pages/login.html";
    });

    // ✅ 修复：移除报错请求头，100%兼容所有浏览器
    async function processText() {
      const text = document.getElementById("text").value.trim();
      const lang = document.getElementById("targetLang").value;
      const load = document.getElementById("load");

      if (!text) { alert("请输入内容"); return; }

      try {
        load.style.display = "flex";
        // 🔥 核心修复：删除了报错的 Content-Type 请求头
        const res = await fetch("/api/ai-process.js", {
          method: "POST",
          body: JSON.stringify({ text, lang })
        });

        const data = await res.json();
        if (data.error) throw new Error(data.error);

        document.getElementById("result").innerHTML = `
          <div class="border p-3 rounded">优化：${data.optimized}</div>
          <div class="border p-3 rounded">翻译：${data.translated}</div>
        `;
      } catch (err) {
        alert("错误：" + err.message);
      } finally {
        load.style.display = "none";
      }
    }
  </script>
</body>
</html>
