<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>语言学习</title>
  <style>
    .loading{display:none;position:fixed;inset:0;background:rgba(255,255,255,0.9);justify-content:center;align-items:center;z-index:999}
    .spin{width:40px;height:40px;border:4px solid #eee;border-top:4px solid #3b82f6;border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{100%{transform:rotate(360deg)}}
  </style>
</head>
<body class="p-4 bg-gray-50">
  <div class="loading" id="load"><div class="spin"></div></div>

  <nav class="flex gap-3 mb-4 text-sm">
    <a href="/pages/index.html" class="font-bold">首页</a>
    <a href="/pages/words.html">单词本</a>
    <a href="/pages/history.html">学习历史</a>
    <a href="/pages/member.html">会员中心</a>
  </nav>

  <h1 class="text-xl font-bold mb-4">语言学习</h1>

  <!-- 目标语言选择：选一次，永久记住（你的核心需求） -->
  <div class="mb-3">
    <label class="text-sm block mb-1">目标语言</label>
    <select id="targetLang" class="w-full p-3 border rounded">
      <option value="es">西班牙语</option>
      <option value="en">英语</option>
    </select>
  </div>

  <textarea id="text" rows="6" class="w-full p-3 border rounded mb-2" placeholder="输入中文"></textarea>
  <button onclick="processText()" class="w-full p-3 bg-blue-600 text-white rounded mb-4">AI处理</button>

  <div id="result" class="space-y-3"></div>

  <script>
    // 页面加载：读取本地保存的语言，默认西班牙语
    window.addEventListener('load', () => {
      const savedLang = localStorage.getItem('targetLang') || 'es';
      const langSelect = document.getElementById('targetLang');
      langSelect.value = savedLang;
      // 切换语言自动保存
      langSelect.addEventListener('change', (e) => {
        localStorage.setItem('targetLang', e.target.value);
      });
    });

    // AI处理：修复请求逻辑，彻底避免JSON错误
    async function processText() {
      const text = document.getElementById('text').value.trim();
      const lang = document.getElementById('targetLang').value;
      const load = document.getElementById('load');
      const resultBox = document.getElementById('result');

      if (!text) {
        alert('请输入内容');
        return;
      }

      load.style.display = 'flex';
      try {
        // 标准fetch请求，带正确的Content-Type
        const res = await fetch('/api/ai-process', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ text, lang })
        });

        // 【核心修复】先检查响应状态，避免405/404等错误导致JSON解析失败
        if (!res.ok) {
          throw new Error(`请求失败：${res.status} ${res.statusText}`);
        }

        // 安全解析JSON
        const data = await res.json();

        // 渲染结果
        resultBox.innerHTML = `
          <div class="border p-3 rounded"><b>优化：</b>${data.optimized}</div>
          <div class="border p-3 rounded"><b>翻译：</b>${data.translated}</div>
        `;

      } catch (err) {
        alert(`错误：${err.message}`);
        resultBox.innerHTML = `<div class="border p-3 rounded text-red-500">出错了：${err.message}</div>`;
      } finally {
        // 强制关闭加载动画，再也不会转圈
        load.style.display = 'none';
      }
    }
  </script>
</body>
</html>
