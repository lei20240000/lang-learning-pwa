<!DOCTYPE html>
<html lang="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>StreamLang - Login</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
    body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#0B1F3A,#0F6FFF);padding:20px}
    .logo-container{display:flex;flex-direction:column;align-items:center;margin-bottom:32px}
    .logo{width:140px;height:140px}
    .brand-name{font-size:32px;font-weight:700;color:white;margin-top:12px}
    .form{width:100%;max-width:360px;background:rgba(255,255,255,0.95);padding:24px;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.1)}
    .input{width:100%;padding:12px 16px;margin-bottom:16px;border:1px solid #e2e8f0;border-radius:8px;font-size:16px}
    .btn{width:100%;padding:14px;background:#0F6FFF;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer}
    .link{text-align:center;margin-top:16px;color:#64748b;font-size:14px}
    .link a{color:#0F6FFF;text-decoration:none;font-weight:500}
    .loading{position:fixed;inset:0;background:rgba(255,255,255,0.9);display:none;align-items:center;justify-content:center;z-index:999}
    .spin{width:40px;height:40px;border:4px solid #eee;border-top:4px solid #0F6FFF;border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{100%{transform:rotate(360deg)}}
  </style>
  <script src="https://esm.sh/@supabase/supabase-js@2.48.1"></script>
</head>
<body>
  <div class="loading" id="load"><div class="spin"></div></div>

  <!-- Logo与品牌名容器 -->
  <div class="logo-container">
    <!-- 使用您提供的原始Logo代码 -->
    <svg class="logo" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#0B1F3A"/>
          <stop offset="100%" stop-color="#0F6FFF"/>
        </linearGradient>
      </defs>
      <rect x="0" y="0" width="1024" height="1024" rx="220" fill="url(#bgGradient)"/>
      <path d="M260 330 Q260 250 350 250 H690 Q780 250 780 330 V570 Q780 650 690 650 H520 L400 740 V650 H350 Q260 650 260 570 Z" fill="white"/>
      <g fill="#0F6FFF">
        <rect x="430" y="420" width="18" height="70" rx="9"/>
        <rect x="465" y="390" width="18" height="130" rx="9"/>
        <rect x="500" y="360" width="18" height="190" rx="9"/>
        <rect x="535" y="390" width="18" height="130" rx="9"/>
        <rect x="570" y="420" width="18" height="70" rx="9"/>
      </g>
    </svg>
    <!-- 品牌名 -->
    <h1 class="brand-name">StreamLang</h1>
  </div>

  <div class="form">
    <input type="email" id="email" class="input" placeholder="Email">
    <input type="password" id="password" class="input" placeholder="Password">
    <button class="btn" id="loginBtn">Log In</button>
    <div class="link">Don't have an account? <a href="#" id="signupLink">Sign Up</a></div>
  </div>

  <script>
    const isZh = navigator.language.startsWith('zh');
    document.getElementById('email').placeholder = isZh ? '邮箱' : 'Email';
    document.getElementById('password').placeholder = isZh ? '密码' : 'Password';
    document.getElementById('loginBtn').textContent = isZh ? '登录' : 'Log In';
    document.querySelector('.link').innerHTML = isZh ? '没有账号？<a href="#" id="signupLink">注册</a>' : 'Don\'t have an account? <a href="#" id="signupLink">Sign Up</a>';

    // 替换为您的Supabase配置
    const supabase = supabase.createClient("https://otqpfonixfirwchpxtbb.supabase.co", "sb_publishable_2R814AFscx7VkSUPOrYrfw_fWoWrxz6");
    const load = document.getElementById('load');

    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      if(!email || !password) return alert(isZh ? '请填写完整信息' : 'Please fill in all fields');

      load.style.display = 'flex';
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      load.style.display = 'none';

      if(error) return alert(isZh ? '登录失败：' + error.message : 'Login failed: ' + error.message);
      location.href = '/pages/index.html';
    });

    document.getElementById('signupLink').addEventListener('click', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      if(!email || !password) return alert(isZh ? '请填写邮箱和密码' : 'Please enter email and password');

      load.style.display = 'flex';
      const { data, error } = await supabase.auth.signUp({ email, password });
      load.style.display = 'none';

      if(error) return alert(isZh ? '注册失败：' + error.message : 'Sign up failed: ' + error.message);
      alert(isZh ? '注册成功，请查收验证邮件' : 'Sign up successful, please check your email');
    });

    supabase.auth.getSession().then(({ data: { session } }) => {
      if(session) location.href = '/pages/index.html';
    });
  </script>
</body>
</html>
