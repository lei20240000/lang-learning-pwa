<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - StreamLang</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    body {
      background-color: #f3f4f6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* 🔹 你原来的 StreamLang Logo（还原） */
    .logo {
      font-size: 42px;
      font-weight: bold;
      color: #2563eb;
      text-align: center;
      margin-bottom: 40px;
    }

    .login-card {
      background: white;
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      width: 100%;
      max-width: 450px;
    }

    .input-group {
      margin-bottom: 24px;
      position: relative;
    }
    .input-group input {
      width: 100%;
      padding: 18px 20px;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      font-size: 18px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-group input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    /* 密码眼睛 */
    .eye-icon {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 22px;
      color: #6b7280;
      user-select: none;
    }

    .login-btn {
      width: 100%;
      padding: 18px;
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 20px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
      transition: background-color 0.2s;
    }
    .login-btn:hover {
      background-color: #1d4ed8;
    }

    .signup-link {
      text-align: center;
      margin-top: 24px;
      font-size: 16px;
      color: #6b7280;
    }
    .signup-link a {
      color: #2563eb;
      font-weight: 500;
      text-decoration: none;
    }
    .signup-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <!-- 🔹 你原来的 StreamLang Logo（还原） -->
  <div class="logo">StreamLang</div>

  <div class="login-card">
    <!-- 🔴 关键修复：包一层 <form> + onsubmit 阻止默认行为 -->
    <form id="loginForm" onsubmit="doLogin(event)">
      <div class="input-group">
        <input type="email" id="email" placeholder="Email" required>
      </div>

      <div class="input-group">
        <input type="password" id="password" placeholder="Password" required>
        <span class="eye-icon" id="eyeBtn">👁️</span>
      </div>

      <!-- 🔴 关键：button 必须是 type="submit" -->
      <button type="submit" class="login-btn">Sign In</button>
    </form>

    <div class="signup-link">
      Don't have an account? <a href="#" id="signupLink">Sign Up</a>
    </div>
  </div>

<script>
  // 眼睛切换
  const eyeBtn = document.getElementById('eyeBtn');
  const passwordInput = document.getElementById('password');

  eyeBtn.addEventListener('click', () => {
    if (passwordInput.type === 'password') {
      passwordInput.type = 'text';
      eyeBtn.textContent = '🙈';
    } else {
      passwordInput.type = 'password';
      eyeBtn.textContent = '👁️';
    }
  });

  // 🔴 核心修复：加 e.preventDefault() 阻止页面刷新！
  function doLogin(e) {
    e.preventDefault(); // 👈 这行是关键！阻止表单默认提交（不刷新、不清空）

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!email || !password) {
      alert('Please enter email and password');
      return;
    }

    // ✅ 登录成功 → 跳主页（不刷新、不丢输入）
    window.location.href = "/";
  }

  // 注册链接
  const signupLink = document.getElementById('signupLink');
  signupLink.addEventListener('click', (e) => {
    e.preventDefault();
    alert('Sign up coming soon');
  });
</script>
</body>
</html>
