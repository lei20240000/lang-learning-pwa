<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - StreamLang</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

  <div class="bg-white p-8 rounded-2xl shadow-lg max-w-md w-full">
    <h1 class="text-3xl font-bold text-center text-blue-600 mb-6">StreamLang</h1>
    
    <div class="space-y-4 mb-6">
      <input type="email" id="email" placeholder="Email"
             class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">

      <div class="relative">
        <input type="password" id="password" placeholder="Password"
               class="w-full px-4 py-3 border rounded-xl pr-12 focus:outline-none focus:ring-2 focus:ring-blue-500">
        <span onclick="togglePwd()" class="absolute right-3 top-1/2 -translate-y-1/2 cursor-pointer text-gray-500">👁️</span>
      </div>
    </div>

    <button onclick="login()" class="w-full py-3 bg-blue-600 text-white rounded-xl text-lg font-medium">Sign In</button>
  </div>

  <script>
    function togglePwd() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    function login() {
      const email = document.getElementById('email').value;
      const pwd = document.getElementById('password').value;
      if (email && pwd) {
        // ✅ 修复 Vercel 404 跳转
        window.location.href = "/";
      } else {
        alert('Please enter email & password');
      }
    }
  </script>
</body>
</html>
