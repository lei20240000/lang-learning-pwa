<!DOCTYPE html>
<html lang="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>StreamLang</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
    /* 柔和浅背景，无焦虑感 */
    body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#f8fcff,#eef5ff);padding:20px}
    .logo-container{display:flex;flex-direction:column;align-items:center;margin-bottom:32px}
    .logo{width:140px;height:140px}
    .brand-name{font-size:32px;font-weight:700;color:#0F6FFF;margin-top:12px}
    .form{width:100%;max-width:360px;background:white;padding:24px;border-radius:16px;box-shadow:0 4px 20px rgba(15,111,255,0.08)}
    .input{width:100%;padding:14px 18px;margin-bottom:16px;border:1px solid #e8f0fe;border-radius:10px;font-size:16px;background:#f8fafe}
    .input:focus{outline:none;border-color:#0F6FFF}
    .btn{width:100%;padding:14px;background:#0F6FFF;color:white;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer}
    .btn:hover{background:#0a5cdd}
    .link{text-align:center;margin-top:16px;color:#666;font-size:14px}
    .link a{color:#0F6FFF;text-decoration:none;font-weight:500}
    .loading{display:none;position:fixed;inset:0;background:rgba(255,255,255,0.9);align-items:center;justify-content:center;z-index:999}
    .spin{width:40px;height:40px;border:4px solid #eee;border-top:4px solid #0F6FFF;border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{100%{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="loading" id="load"><div class="spin"></div></div>

  <!-- 你的原版官方Logo -->
  <div class="logo-container">
    <svg class="logo" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0B1F3A"/><stop offset="100%" stop-color="#0F6FFF"/></linearGradient></defs>
      <rect x="0" y="0" width="1024" height="1024" rx="220" fill="url(#bgGradient)"/>
      <path d="M260 330 Q260 250 350 250 H690 Q780 250 780 330 V570 Q780 650 690 650 H520 L400 740 V650 H350 Q260 650 260 570 Z" fill="white"/>
      <g fill="#0F6FFF"><rect x="430" y="420" width="18" height="70" rx="9"/><rect x="465" y="390" width="18" height="130" rx="9"/><rect x="500" y="360" width="18" height="190" rx="9"/><rect x="535" y="390" width="18" height="130" rx="9"/><rect x="570" y="420" width="18" height="70" rx="9"/></g>
    </svg>
    <h1 class="brand-name">StreamLang</h1>
  </div>

  <div class="form">
    <input type="email" id="email" class="input">
    <input type="password" id="password" class="input">
    <button class="btn" id="loginBtn"></button>
    <div class="link" id="tip"></div>
  </div>

  <!-- 🔥 正确 Supabase 引入（零语法报错）-->
  <script type="module">
    // ###########################
    // 👉 只需要填写这里 2 行！
    // ###########################
    const SUPABASE_URL = "https://otqpfonixfirwchpxtbb.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_2R814AFscx7VkSUPOrYrfw_fWoWrxz6";

    // 引入Supabase（官方正确写法，无报错）
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 自动跟随系统语言（中/英）
    const sysLang = navigator.language.startsWith('zh') ? 'zh' : 'en';
    const I18N = {
      zh: {
        email: "邮箱", password: "密码", login: "登录",
        tip: "没有账号？<a href='#' id='signupLink'>注册</a>",
        empty: "请输入账号密码",
        loginSuccess: "登录成功，正在跳转",
        registerSuccess: "注册成功，请查收验证邮件"
      },
      en: {
        email: "Email", password: "Password", login: "Log In",
        tip: "Don't have an account? <a href='#' id='signupLink'>Sign Up</a>",
        empty: "Please fill email & password",
        loginSuccess: "Login Success, Redirecting...",
        registerSuccess: "Sign Up Success, Please Verify Email"
      }
    };
    const txt = I18N[sysLang];

    // 自动赋值界面文字
    document.getElementById('email').placeholder = txt.email;
    document.getElementById('password').placeholder = txt.password;
    document.getElementById('loginBtn').textContent = txt.login;
    document.getElementById('tip').innerHTML = txt.tip;

    const load = document.getElementById('load');

    // 真实登录功能
    document.getElementById('loginBtn').onclick = async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!email || !password) {
        alert(txt.empty);
        return;
      }

      load.style.display = 'flex';
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      load.style.display = 'none';

      if (error) {
        alert(error.message);
        return;
      }

      alert(txt.loginSuccess);
      location.href = '/pages/index.html';
    };

    // 真实注册功能
    document.getElementById('signupLink').onclick = async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!email || !password) {
        alert(txt.empty);
        return;
      }

      load.style.display = 'flex';
      const { error } = await supabase.auth.signUp({ email, password });
      load.style.display = 'none';

      if (error) {
        alert(error.message);
        return;
      }

      alert(txt.registerSuccess);
    };
  </script>
</body>
</html>
