<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - StreamLang</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    body {
      background-color: #f3f4f6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    /* 顶部 LOGO 区域 */
    .logo-container {
      width: 300px;
      height: 120px;
      border: 2px solid #ef4444;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 30px;
      color: #ef4444;
      font-size: 28px;
      font-weight: bold;
    }
    /* 登录卡片 */
    .login-card {
      background: white;
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      width: 100%;
      max-width: 500px;
    }
    .app-title {
      font-size: 48px;
      font-weight: bold;
      color: #3b82f6;
      text-align: center;
      margin-bottom: 32px;
    }
    .input-group {
      margin-bottom: 20px;
      position: relative;
    }
    .input-group input {
      width: 100%;
      padding: 16px 20px;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      font-size: 20px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-group input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
    /* 密码眼睛图标 */
    .eye-icon {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 24px;
      color: #6b7280;
      background: #f3f4f6;
      padding: 4px;
      border-radius: 8px;
    }
    .login-btn {
      width: 100%;
      padding: 16px;
      background-color: #3b82f6;
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 24px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
      transition: background-color 0.2s;
    }
    .login-btn:hover {
      background-color: #2563eb;
    }
    .signup-link {
      text-align: center;
      margin-top: 20px;
      font-size: 16px;
      color: #6b7280;
    }
    .signup-link a {
      color: #3b82f6;
      font-weight: 500;
      text-decoration: none;
    }
    .signup-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <!-- 顶部 LOGO 区域（按你给的红框还原） -->
  <div class="logo-container">
    logo
  </div>

  <div class="login-card">
    <h1 class="app-title">StreamLang</h1>

    <div class="input-group">
      <input type="email" id="email" placeholder="邮箱">
    </div>

    <div class="input-group">
      <input type="password" id="password" placeholder="密码">
      <span class="eye-icon" id="eyeBtn">👁️</span>
    </div>

    <button class="login-btn" id="loginBtn">登录</button>

    <div class="signup-link">
      没有账号？<a href="#" id="signupLink">立即注册</a>
    </div>
  </div>

  <script>
    // 密码眼睛切换功能
    const eyeBtn = document.getElementById('eyeBtn');
    const passwordInput = document.getElementById('password');

    eyeBtn.addEventListener('click', () => {
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        eyeBtn.textContent = '🙈';
      } else {
        passwordInput.type = 'password';
        eyeBtn.textContent = '👁️';
      }
    });

    // 登录跳转功能（Vercel 专用，永不 404）
    const loginBtn = document.getElementById('loginBtn');
    loginBtn.addEventListener('click', () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!email || !password) {
        alert('请输入邮箱和密码');
        return;
      }

      // ✅ Vercel 唯一正确跳转，绝对不 404
      window.location.href = "/";
    });

    // 注册链接（可点击，后续可加注册页）
    const signupLink = document.getElementById('signupLink');
    signupLink.addEventListener('click', (e) => {
      e.preventDefault();
      alert('注册功能即将上线');
    });
  </script>
</body>
</html>
