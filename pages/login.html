<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - StreamLang</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center justify-center p-4">

  <!-- 你指定的 SVG LOGO -->
  <div class="w-24 h-24 mb-6">
    <svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#0B1F3A"/>
          <stop offset="100%" stop-color="#0F6FFF"/>
        </linearGradient>
      </defs>
      <rect x="0" y="0" width="1024" height="1024" rx="220" fill="url(#bgGradient)"/>
      <path d="M260 330 Q260 250 350 250 H690 Q780 250 780 330 V570 Q780 650 690 650 H520 L400 740 V650 H350 Q260 650 260 570 Z" fill="white"/>
      <g fill="#0F6FFF">
        <rect x="430" y="420" width="18" height="70" rx="9"/>
        <rect x="465" y="390" width="18" height="130" rx="9"/>
        <rect x="500" y="360" width="18" height="190" rx="9"/>
        <rect x="535" y="390" width="18" height="130" rx="9"/>
        <rect x="570" y="420" width="18" height="70" rx="9"/>
      </g>
    </svg>
  </div>

  <div class="bg-white p-8 rounded-2xl shadow-lg max-w-md w-full">
    <h1 class="text-3xl font-bold text-center text-blue-600 mb-6">StreamLang</h1>
    
    <div class="space-y-4 mb-6">
      <!-- 无任何钥匙/锁图标 -->
      <input type="email" id="email" placeholder="Email" class="w-full px-4 py-3 border rounded-xl">
      <div class="relative">
        <input type="password" id="password" placeholder="Password" class="w-full px-4 py-3 border rounded-xl pr-12">
        <span onclick="togglePwd()" class="absolute right-3 top-1/2 -translate-y-1/2 cursor-pointer text-gray-500">👁️</span>
      </div>
    </div>

    <button onclick="handleLogin()" class="w-full py-3 bg-blue-600 text-white rounded-xl text-lg font-medium">
      Sign In
    </button>

    <p class="text-center text-gray-500 text-sm mt-4">
      Don't have an account?
      <span onclick="handleSignUp()" class="text-blue-600 font-medium cursor-pointer">Sign Up</span>
    </p>
  </div>

<script>
  // 纯前端逻辑
  // 无任何密钥
  // 无任何 Supabase 暴露
  // 无任何安全风险

  function togglePwd() {
    const input = document.getElementById('password');
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  // 登录 → 调用后端接口（安全）
  async function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!email || !password) {
      alert('Please enter email and password');
      return;
    }

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (!res.ok) {
        alert(data.error || 'Login failed');
        return;
      }

      // 登录成功 → 跳主页
      window.location.href = '/';
    } catch (e) {
      alert('Server error');
    }
  }

  // 注册 → 调用后端接口
  async function handleSignUp() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!email || !password) {
      alert('Please enter email and password');
      return;
    }

    try {
      const res = await fetch('/api/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (!res.ok) {
        alert(data.error || 'Sign up failed');
        return;
      }

      alert('Check your email to confirm your account!');
    } catch (e) {
      alert('Server error');
    }
  }
</script>

</body>
</html>
