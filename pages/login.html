<!DOCTYPE html>
<html lang="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>StreamLang - Login</title>
  <!-- 极致精简内联样式，无外部CSS，文件超小 -->
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
    body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f8fafc;padding:20px}
    .logo{width:120px;height:120px;margin-bottom:16px}
    h1{font-size:28px;font-weight:700;color:#165DFF;margin-bottom:32px}
    .form{width:100%;max-width:360px;background:#fff;padding:24px;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.08)}
    .input{width:100%;padding:12px 16px;margin-bottom:16px;border:1px solid #e2e8f0;border-radius:8px;font-size:16px}
    .btn{width:100%;padding:14px;background:#165DFF;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer}
    .link{text-align:center;margin-top:16px;color:#64748b;font-size:14px}
    .link a{color:#165DFF;text-decoration:none;font-weight:500}
    .loading{position:fixed;inset:0;background:rgba(255,255,255,0.9);display:none;align-items:center;justify-content:center;z-index:999}
    .spin{width:40px;height:40px;border:4px solid #eee;border-top:4px solid #165DFF;border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{100%{transform:rotate(360deg)}}
  </style>
  <!-- Supabase CDN（缓存友好，仅加载一次） -->
  <script src="https://esm.sh/@supabase/supabase-js@2.48.1"></script>
</head>
<body>
  <div class="loading" id="load"><div class="spin"></div></div>

  <!-- 🔥 1:1还原你提供的Logo，矢量SVG，<1KB，内联无外部请求 -->
  <svg class="logo" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- 圆角方形背景（还原原图渐变） -->
    <rect x="4" y="4" width="112" height="112" rx="20" fill="url(#bgGradient)" />
    <!-- 白色气泡主体（1:1还原原图形状） -->
    <path d="M30 30 L90 30 C100 30 105 40 105 50 L105 70 C105 80 100 90 90 90 L30 90 L30 70 L90 70 C95 70 98 65 98 60 L98 50 C98 45 95 40 90 40 L30 40 Z" fill="white" opacity="0.95" />
    <!-- 气泡青蓝色渐变边缘（还原原图光影） -->
    <path d="M30 30 L90 30 C100 30 105 40 105 50 L105 70 C105 80 100 90 90 90 L30 90 L30 70 L90 70 C95 70 98 65 98 60 L98 50 C98 45 95 40 90 40 L30 40 Z" fill="url(#waveGradient)" opacity="0.3" />
    <!-- 音频波形（1:1还原原图6个柱子高度） -->
    <rect x="44" y="52" width="5" height="8" fill="white" />
    <rect x="54" y="44" width="5" height="16" fill="white" />
    <rect x="64" y="50" width="5" height="10" fill="white" />
    <rect x="74" y="40" width="5" height="20" fill="white" />
    <rect x="84" y="46" width="5" height="14" fill="white" />
    <rect x="94" y="53" width="5" height="7" fill="white" />
    <!-- 渐变定义（完全匹配原图色彩） -->
    <defs>
      <linearGradient id="bgGradient" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#0A3D73" />
        <stop offset="100%" stop-color="#00D1C0" />
      </linearGradient>
      <linearGradient id="waveGradient" x1="30" y1="30" x2="105" y2="90" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#FFFFFF" />
        <stop offset="100%" stop-color="#00D1C0" />
      </linearGradient>
    </defs>
  </svg>

  <h1>StreamLang</h1>

  <div class="form">
    <input type="email" id="email" class="input" placeholder="Email">
    <input type="password" id="password" class="input" placeholder="Password">
    <button class="btn" id="loginBtn">Log In</button>
    <div class="link">Don't have an account? <a href="#" id="signupLink">Sign Up</a></div>
  </div>

  <script>
    // 系统语言自动适配（中文/英文）
    const isZh = navigator.language.startsWith('zh');
    document.querySelector('h1').textContent = 'StreamLang';
    document.getElementById('email').placeholder = isZh ? '邮箱' : 'Email';
    document.getElementById('password').placeholder = isZh ? '密码' : 'Password';
    document.getElementById('loginBtn').textContent = isZh ? '登录' : 'Log In';
    document.querySelector('.link').innerHTML = isZh ? '没有账号？<a href="#" id="signupLink">注册</a>' : 'Don\'t have an account? <a href="#" id="signupLink">Sign Up</a>';

    // 🔴 替换为你项目的Supabase URL和ANON_KEY（和首页完全一致）
    const supabase = supabase.createClient("https://otqpfonixfirwchpxtbb.supabase.co", "sb_publishable_2R814AFscx7VkSUPOrYrfw_fWoWrxz6");
    const load = document.getElementById('load');

    // 登录逻辑
    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      if(!email || !password) return alert(isZh ? '请填写完整信息' : 'Please fill in all fields');

      load.style.display = 'flex';
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      load.style.display = 'none';

      if(error) return alert(isZh ? '登录失败：' + error.message : 'Login failed: ' + error.message);
      // 登录成功跳主界面
      location.href = '/pages/index.html';
    });

    // 注册逻辑
    document.getElementById('signupLink').addEventListener('click', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      if(!email || !password) return alert(isZh ? '请填写邮箱和密码' : 'Please enter email and password');

      load.style.display = 'flex';
      const { data, error } = await supabase.auth.signUp({ email, password });
      load.style.display = 'none';

      if(error) return alert(isZh ? '注册失败：' + error.message : 'Sign up failed: ' + error.message);
      alert(isZh ? '注册成功，请查收验证邮件' : 'Sign up successful, please check your email');
    });

    // 自动登录检测：已登录直接跳首页
    supabase.auth.getSession().then(({ data: { session } }) => {
      if(session) location.href = '/pages/index.html';
    });
  </script>
</body>
</html>
