<!DOCTYPE html>
<html lang="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>StreamLang - Login</title>
  <!-- 极致精简内联样式，无外部CSS -->
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
    /* 舒缓背景：低饱和浅蓝渐变，减轻焦虑感 */
    body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
        background:linear-gradient(135deg,#f0f8ff,#e6f3ff);padding:20px}
    .logo-container{display:flex;flex-direction:column;align-items:center;margin-bottom:32px}
    .logo{width:140px;height:140px}
    .brand-name{font-size:32px;font-weight:700;color:#0F6FFF;margin-top:12px}
    /* 优化卡片：半透明白色，增强可读性 */
    .form{width:100%;max-width:360px;background:rgba(255,255,255,0.98);padding:24px;border-radius:16px;
          box-shadow:0 4px 20px rgba(15,111,255,0.1);backdrop-filter:blur(8px)}
    .input{width:100%;padding:14px 18px;margin-bottom:16px;border:1px solid #e8f0fe;border-radius:10px;
           font-size:16px;background:#f8fafe;transition:border 0.3s}
    .input:focus{outline:none;border-color:#0F6FFF;box-shadow:0 0 0 3px rgba(15,111,255,0.1)}
    .btn{width:100%;padding:14px;background:#0F6FFF;color:#fff;border:none;border-radius:10px;
         font-size:16px;font-weight:600;cursor:pointer;transition:background 0.3s}
    .btn:hover{background:#0A5EDD}
    .link{text-align:center;margin-top:16px;color:#64748b;font-size:14px}
    .link a{color:#0F6FFF;text-decoration:none;font-weight:500}
    .loading{position:fixed;inset:0;background:rgba(255,255,255,0.9);display:none;align-items:center;
             justify-content:center;z-index:999}
    .spin{width:40px;height:40px;border:4px solid #eee;border-top:4px solid #0F6FFF;border-radius:50%;
          animation:spin 1s linear infinite}
    @keyframes spin{100%{transform:rotate(360deg)}}
  </style>
  <!-- Supabase CDN（缓存友好，仅加载一次） -->
  <script src="https://esm.sh/@supabase/supabase-js@2.48.1"></script>
</head>
<body>
  <div class="loading" id="load"><div class="spin"></div></div>

  <!-- Logo与品牌名容器 -->
  <div class="logo-container">
    <!-- 使用您提供的原始Logo代码，100%还原 -->
    <svg class="logo" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#0B1F3A"/>
          <stop offset="100%" stop-color="#0F6FFF"/>
        </linearGradient>
      </defs>
      <rect x="0" y="0" width="1024" height="1024" rx="220" fill="url(#bgGradient)"/>
      <path d="M260 330 Q260 250 350 250 H690 Q780 250 780 330 V570 Q780 650 690 650 H520 L400 740 V650 H350 Q260 650 260 570 Z" fill="white"/>
      <g fill="#0F6FFF">
        <rect x="430" y="420" width="18" height="70" rx="9"/>
        <rect x="465" y="390" width="18" height="130" rx="9"/>
        <rect x="500" y="360" width="18" height="190" rx="9"/>
        <rect x="535" y="390" width="18" height="130" rx="9"/>
        <rect x="570" y="420" width="18" height="70" rx="9"/>
      </g>
    </svg>
    <!-- 品牌名 -->
    <h1 class="brand-name">StreamLang</h1>
  </div>

  <div class="form">
    <input type="email" id="email" class="input" placeholder="Email" required>
    <input type="password" id="password" class="input" placeholder="Password" required>
    <button class="btn" id="loginBtn">Log In</button>
    <div class="link">Don't have an account? <a href="#" id="signupLink">Sign Up</a></div>
  </div>

  <script>
    // 系统语言自动适配（中文/英文）
    const isZh = navigator.language.startsWith('zh');
    document.getElementById('email').placeholder = isZh ? '邮箱' : 'Email';
    document.getElementById('password').placeholder = isZh ? '密码' : 'Password';
    document.getElementById('loginBtn').textContent = isZh ? '登录' : 'Log In';
    document.querySelector('.link').innerHTML = isZh ? '没有账号？<a href="#" id="signupLink">注册</a>' : 'Don\'t have an account? <a href="#" id="signupLink">Sign Up</a>';

    // 🔴 替换为你项目的Supabase URL和ANON_KEY（必须与首页一致）
    const supabaseUrl = "https://otqpfonixfirwchpxtbb.supabase.co";
    const supabaseAnonKey = "sb_publishable_2R814AFscx7VkSUPOrYrfw_fWoWrxz6";
    const supabase = supabase.createClient(supabaseUrl, supabaseAnonKey);
    const load = document.getElementById('load');

    // 🔐 登录逻辑修复：添加完整错误处理和状态监听
    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      
      if(!email || !password) {
        return alert(isZh ? '请填写完整的邮箱和密码' : 'Please fill in both email and password');
      }

      load.style.display = 'flex';
      try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        load.style.display = 'none';

        if (error) {
          console.error('登录错误:', error);
          return alert(isZh ? `登录失败: ${error.message}` : `Login failed: ${error.message}`);
        }
        
        if (data.session) {
          alert(isZh ? '登录成功！正在进入应用...' : 'Login successful! Redirecting to app...');
          location.href = '/pages/index.html'; // 跳转到首页
        }
      } catch (err) {
        load.style.display = 'none';
        console.error('登录异常:', err);
        alert(isZh ? '登录过程中发生错误，请重试' : 'An error occurred during login. Please try again.');
      }
    });

    // 📝 注册逻辑修复：添加完整错误处理
    document.getElementById('signupLink').addEventListener('click', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      
      if(!email || !password) {
        return alert(isZh ? '请填写完整的邮箱和密码' : 'Please fill in both email and password');
      }

      load.style.display = 'flex';
      try {
        const { data, error } = await supabase.auth.signUp({ 
          email, 
          password,
          options: {
            emailRedirectTo: window.location.origin + '/pages/index.html' // 注册成功后重定向
          }
        });
        load.style.display = 'none';

        if (error) {
          console.error('注册错误:', error);
          return alert(isZh ? `注册失败: ${error.message}` : `Sign up failed: ${error.message}`);
        }
        
        alert(isZh ? '注册成功！请查收邮箱验证链接' : 'Sign up successful! Please check your email for verification link');
      } catch (err) {
        load.style.display = 'none';
        console.error('注册异常:', err);
        alert(isZh ? '注册过程中发生错误，请重试' : 'An error occurred during sign up. Please try again.');
      }
    });

    // 🔄 自动登录检测：页面加载时检查会话
    async function checkSession() {
      try {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
          console.log('已登录，自动跳转到首页');
          location.href = '/pages/index.html';
        }
      } catch (err) {
        console.error('会话检查错误:', err);
      }
    }

    // 页面加载完成后检查会话
    window.addEventListener('DOMContentLoaded', checkSession);
  </script>
</body>
</html>
