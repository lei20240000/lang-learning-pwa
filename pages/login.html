<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - StreamLang</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, sans-serif;
    }
    body {
      background: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .login-box {
      background: white;
      width: 100%;
      max-width: 400px;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
    }
    .logo {
      font-size: 32px;
      font-weight: bold;
      color: #2563eb;
      text-align: center;
      margin-bottom: 30px;
    }
    .form-item {
      margin-bottom: 16px;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      font-size: 16px;
    }
    .pwd-wrap {
      position: relative;
    }
    #eye {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #6b7280;
      user-select: none;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
    }
  </style>
</head>
<body>

<div class="login-box">
  <div class="logo">StreamLang</div>

  <div class="form-item">
    <input type="email" id="email" placeholder="Email">
  </div>

  <div class="form-item pwd-wrap">
    <input type="password" id="password" placeholder="Password">
    <span id="eye">👁️</span>
  </div>

  <button onclick="doLogin()">Sign In</button>
</div>

<script>
  // 密码显示/隐藏
  const eye = document.getElementById('eye');
  const pwd = document.getElementById('password');

  eye.onclick = function () {
    if (pwd.type === 'password') {
      pwd.type = 'text';
      eye.textContent = '🙈';
    } else {
      pwd.type = 'password';
      eye.textContent = '👁️';
    }
  };

  // 登录跳转
  function doLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!email || !password) {
      alert('Please enter email and password');
      return;
    }

    // 跳转到主页，不改动任何原有功能
    window.location.href = "index.html";
  }
</script>

</body>
</html>
