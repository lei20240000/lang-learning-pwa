<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learning History</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js'
    const supabase = createClient("https://otqpfonixfirwchpxtbb.supabase.co", "sb_publishable_2R814AFscx7VkSUPOrYrfw_fWoWrxz6");
    window.supabase = supabase;
  </script>
</head>
<body class="bg-gray-50 p-4">
  <nav class="mb-4"><a href="index.html" class="text-blue-600">← 返回首页</a></nav>
  <div id="list" class="space-y-3"></div>

  <script>
    async function loadHistory() {
      const { data } = await supabase.from("learning_history").select("*").eq("user_id", localStorage.user_id);
      document.getElementById("list").innerHTML = data.map(h => `
        <div class="border p-3 rounded">
          <b>原文：</b>${h.original}<br>
          <b>优化：</b>${h.optimized}
        </div>
      `).join("");
    }
    loadHistory();
  </script>
</body>
</html>
